content: |
  ProTest -- Architecture (Hexagonal)

       Adapters            Ports              Domain
    ┌───────────┐    ┌─────────────┐    ┌──────────────┐
    │ CLI       │───>│ run_session │───>│ Session      │
    │ Loader    │───>│ collect     │───>│  └ Suite     │
    │ Reporters │<───│ EventBus    │<───│    └ Runner  │
    └───────────┘    └─────────────┘    └──────────────┘

  Scope = where you bind, not how you decorate.

    session.bind(fx)  =>  lives for the session
    suite.bind(fx)    =>  lives for the suite
    (no bind)         =>  fresh each test
