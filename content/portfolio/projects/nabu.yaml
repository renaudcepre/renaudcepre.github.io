  """Nabu -- AI-powered answer engine."""


  from dataclasses import dataclass, field


  @dataclass
  class Project:
      name: str = "Nabu"
      description: str = "AI-powered answer engine"
      stack: list[str] = field(default_factory=lambda: [
          "Python",
          "FastAPI",
          "vLLM (Qwen)",
          "ChromaDB",
          "RAG pipeline",
      ])
      status: str = "In development"

      def search(self, query: str) -> str:
          return f"Searching Nabu for: {query}"


  nabu = Project()
