<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e14;
    color: #bfbdb6;
    font-family: 'JetBrains Mono', 'Cascadia Mono', 'SF Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .container {
    text-align: center;
    padding: 2rem;
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
    background: linear-gradient(135deg, #73d0ff, #dfbfff, #f29e74);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shift 4s ease-in-out infinite alternate;
    background-size: 200% 200%;
  }

  @keyframes shift {
    0%   { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  .subtitle {
    color: #acb6bf88;
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }

  .prompt {
    font-size: 0.9rem;
    color: #bfbdb6;
    line-height: 1.8;
    text-align: left;
    display: inline-block;
  }

  .prompt .c { color: #acb6bf55; }
  .prompt .g { color: #aad94c; }
  .prompt .y { color: #e6b450; }
  .prompt .b { color: #73d0ff; }
  .prompt .m { color: #dfbfff; }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 1.1em;
    background: #e6b450;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .links {
    margin-top: 2rem;
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .links a {
    color: #73d0ff;
    text-decoration: none;
    font-size: 0.8rem;
    border-bottom: 1px dashed #73d0ff44;
    transition: border-color 0.2s;
  }

  .links a:hover {
    border-color: #73d0ff;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Hello, World</h1>
    <div class="subtitle">senior python dev &middot; audio &middot; electronic music</div>

    <div class="prompt">
      <span class="c"># </span><span class="g">whoami</span><br>
      <span class="m">Started at 42</span> <span class="c">&mdash;</span> Corewar in C, graph theory, the whole common core.<br>
      <span class="c"># </span><span class="g">now</span><br>
      Python backend, software architecture, and electronic music.<br>
      <span class="c"># </span><span class="g">ls</span> <span class="y">portfolio/</span><br>
      <span class="b">about.md</span> &nbsp; <span class="b">skills.md</span> &nbsp; <span class="b">audio/</span> &nbsp; <span class="b">projects/</span><br>
      <span class="c">&gt;</span> <span class="cursor"></span>
    </div>

    <div class="links">
      <a href="/about">about.md</a>
      <a href="/skills">skills.md</a>
      <a href="/audio">audio/</a>
      <a href="/projects">projects/</a>
    </div>
  </div>
</body>
</html>
